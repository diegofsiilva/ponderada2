<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>F1 Globe Pins</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#020617;
font-family:sans-serif;
}

#title{
position:absolute;
top:16px;
left:16px;
background:white;
padding:10px 14px;
border-radius:8px;
}

#tooltip{
position:absolute;
display:none;
background:white;
padding:6px 8px;
border-radius:6px;
font-size:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#legend{
position:absolute;
top:70px;
left:16px;

background:rgba(255,255,255,0.95);
backdrop-filter:blur(6px);

padding:14px 16px;
border-radius:12px;

box-shadow:0 8px 24px rgba(0,0,0,0.25);

font-size:12px;
color:#0f172a;

min-width:180px;
}

.legend-item{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.legend-color{
width:12px;
height:12px;
border-radius:3px;
}

#hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;

  padding: 12px 20px;
  display: flex;
  gap: 24px;

  font-size: 12px;
  color: rgba(255,255,255,0.80);
}

.hint-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hint-icon {
  font-size: 16px;
  line-height: 1;
}
</style>
</head>

<body>

<div id="title">F1 Globe 📍🏁</div>
<div id="tooltip"></div>
<div id="legend"><h3>Corridas F1</h3></div>

<div id="hint">
  <div class="hint-item">
    <span class="hint-icon">🖱️</span>
    <span>Arraste para girar</span>
  </div>
  <div class="hint-item">
    <span class="hint-icon">🔍</span>
    <span>Scroll para zoom</span>
  </div>
  <div class="hint-item">
    <span class="hint-icon">📍</span>
    <span>Passe o mouse sobre um pin para ver detalhes</span>
  </div>
</div>

<script>

const RADIUS = 6;
let rotX = 0.3, rotY = 0.5, zoom = 18;

const races = [
{ name:"Interlagos - 71 voltas", lat:-23.7, lng:-46.7, valor:71, cor:"#22c55e"},
{ name:"Monaco - 78 voltas", lat:43.7, lng:7.4, valor:78, cor:"#ef4444"},
{ name:"Silverstone - 52 voltas", lat:52.0, lng:-1.0, valor:52, cor:"#3b82f6"},
{ name:"Suzuka - 53 voltas", lat:34.8, lng:136.5, valor:53, cor:"#a855f7"},
{ name:"Austin - 56 voltas", lat:30.1, lng:-97.6, valor:56, cor:"#06b6d4"}
];

d3.select("#legend")
.selectAll(".legend-item")
.data(races)
.enter()
.append("div")
.attr("class","legend-item")
.html(d=>`
  <div class="legend-color" style="background:${d.cor}"></div>
  <div>${d.name}</div>
`);

function latLngToSphere(lat, lng, radius){
const phi = (90 - lat) * Math.PI/180;
const theta = (lng + 180) * Math.PI/180;

return {
x: -(radius * Math.sin(phi) * Math.cos(theta)),
y: radius * Math.cos(phi),
z: radius * Math.sin(phi) * Math.sin(theta)
};
}

const scene = new THREE.Scene();
scene.background = new THREE.Color("#020617");

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// luz
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,10,10);
scene.add(light);

const texture = new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
);

const globe = new THREE.Mesh(
new THREE.SphereGeometry(RADIUS,64,64),
new THREE.MeshStandardMaterial({map:texture})
);

scene.add(globe);

const meshes = [];
const maxR = d3.max(races, d=>d.valor);

races.forEach((r,i)=>{

const pos = latLngToSphere(r.lat, r.lng, RADIUS);
const normal = new THREE.Vector3(pos.x,pos.y,pos.z).normalize();

const altura = (r.valor / maxR) * 2 + 0.5;

const group = new THREE.Group();

const material = new THREE.MeshStandardMaterial({
color:r.cor,
emissive:r.cor,
emissiveIntensity:0.25
});

const sphere = new THREE.Mesh(
new THREE.SphereGeometry(0.18,16,16),
material
);

const cone = new THREE.Mesh(
new THREE.ConeGeometry(0.07, altura, 16),
material
);

cone.position.y = 0;
sphere.position.y = altura/2 + 0.15;

group.add(cone);
group.add(sphere);

group.position.set(pos.x,pos.y,pos.z);

// rotação radial
group.quaternion.setFromUnitVectors(
new THREE.Vector3(0,1,0),
normal
);

globe.add(group);
meshes.push(group);

d3.select({t:0})
.transition()
.duration(1200)
.delay(i*200)
.tween("scale", function(){
return function(t){
group.scale.set(t,t,t);
};
});

});

const tooltip = document.getElementById("tooltip");
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{
mouse.x = (e.clientX/innerWidth)*2-1;
mouse.y = -(e.clientY/innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);
const hits = raycaster.intersectObjects(meshes,true);

if(hits.length){
const obj = hits[0].object.parent;
const index = meshes.indexOf(obj);
const d = races[index];

tooltip.style.display="block";
tooltip.style.left = e.clientX+10+"px";
tooltip.style.top = e.clientY+"px";
tooltip.innerHTML = `<b>${d.name}</b><br>${d.valor} voltas`;
}else{
tooltip.style.display="none";
}
});

function updateCam(){
camera.position.x = Math.sin(rotY)*Math.cos(rotX)*zoom;
camera.position.y = Math.sin(rotX)*zoom;
camera.position.z = Math.cos(rotY)*Math.cos(rotX)*zoom;
camera.lookAt(0,0,0);
}
updateCam();

d3.select(renderer.domElement).call(
d3.drag().on("drag",(e)=>{
rotY += e.dx * 0.005;
rotX += e.dy * 0.005;
updateCam();
})
);

d3.select(renderer.domElement).call(
d3.zoom().scaleExtent([10,40]).on("zoom",(e)=>{
zoom = e.transform.k;
updateCam();
})
);

function animate(){
requestAnimationFrame(animate);
globe.rotation.y += 0.0015;
renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
renderer.setSize(innerWidth,innerHeight);
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
});

</script>

</body>
</html>
