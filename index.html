<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa 3D — Fórmula 1</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
overflow:hidden;
font-family:sans-serif;
background:#0f172a;
}

#title{
position:absolute;
top:16px;
left:16px;
background:rgba(255,255,255,0.9);
padding:10px 14px;
border-radius:8px;
font-size:14px;
}

#hint{
position:absolute;
bottom:16px;
right:16px;
background:rgba(255,255,255,0.8);
padding:6px 10px;
border-radius:6px;
font-size:11px;
}
</style>
</head>

<body>

<div id="title">Corridas de Fórmula 1 pelo Mundo 🌍🏁</div>
<div id="hint">Arraste para girar · Scroll para zoom</div>

<script>

// --------------------
// CONFIG
// --------------------

const MAP_SIZE = 20;
const MAX_H = 6;

// --------------------
// DADOS REAIS F1
// --------------------

const races = [
{ name:"Interlagos", lat:-23.7036, lng:-46.6997, valor:71, cor:"#22c55e"},
{ name:"Monaco", lat:43.7347, lng:7.4206, valor:78, cor:"#ef4444"},
{ name:"Silverstone", lat:52.0786, lng:-1.0169, valor:52, cor:"#3b82f6"},
{ name:"Spa", lat:50.4372, lng:5.9714, valor:44, cor:"#eab308"},
{ name:"Monza", lat:45.6156, lng:9.2811, valor:53, cor:"#f97316"},
{ name:"Suzuka", lat:34.8431, lng:136.5410, valor:53, cor:"#a855f7"},
{ name:"Austin", lat:30.1328, lng:-97.6411, valor:56, cor:"#06b6d4"},
{ name:"Abu Dhabi", lat:24.4672, lng:54.6031, valor:58, cor:"#ec4899"},
{ name:"Melbourne", lat:-37.8497, lng:144.9680, valor:58, cor:"#84cc16"},
{ name:"Bahrain", lat:26.0325, lng:50.5106, valor:57, cor:"#f43f5e"}
];

// --------------------
// LAT/LNG → 3D GLOBAL
// --------------------

function toXZ(lat, lng) {
  const x = (lng / 180) * (MAP_SIZE / 2);
  const z = (lat / 90) * (MAP_SIZE / 2) * -1;
  return { x, z };
}

// --------------------
// THREE.JS
// --------------------

const W = window.innerWidth;
const H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color("#0f172a");

const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
camera.position.set(0, 14, 18);
camera.lookAt(0, 0, 0);

// luz
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(10, 20, 10);
dir.castShadow = true;
scene.add(dir);

// --------------------
// MAPA GLOBAL (TEXTURA)
// --------------------

const loader = new THREE.TextureLoader();

const mapTexture = loader.load(
"https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg"
);

const plane = new THREE.Mesh(
new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE * 0.5),
new THREE.MeshLambertMaterial({ map: mapTexture })
);

plane.rotation.x = -Math.PI / 2;
plane.receiveShadow = true;

scene.add(plane);

// --------------------
// COLUNAS F1
// --------------------

const maxR = Math.max(...races.map(r => r.valor));

races.forEach((r, i) => {

const { x, z } = toXZ(r.lat, r.lng);

const h = (r.valor / maxR) * MAX_H;

const mesh = new THREE.Mesh(
new THREE.CylinderGeometry(0.25, 0.25, h, 16),
new THREE.MeshLambertMaterial({ color: r.cor })
);

mesh.position.set(x, h / 2, z);
mesh.castShadow = true;

scene.add(mesh);

// base
const base = new THREE.Mesh(
new THREE.CylinderGeometry(0.35, 0.35, 0.05, 16),
new THREE.MeshLambertMaterial({ color: r.cor, transparent: true, opacity: 0.5 })
);

base.position.set(x, 0.03, z);

scene.add(base);

});

// --------------------
// CONTROLE DE CÂMERA
// --------------------

let drag = false, px = 0, py = 0;
let rotX = 0.6, rotY = 0.3, zoom = 22;

function updateCam() {
  camera.position.x = Math.sin(rotY) * Math.cos(rotX) * zoom;
  camera.position.y = Math.sin(rotX) * zoom;
  camera.position.z = Math.cos(rotY) * Math.cos(rotX) * zoom;
  camera.lookAt(0, 0, 0);
}

updateCam();

renderer.domElement.addEventListener("mousedown", e => {
  drag = true;
  px = e.clientX;
  py = e.clientY;
});

window.addEventListener("mouseup", () => drag = false);

window.addEventListener("mousemove", e => {
  if (!drag) return;

  rotY += (e.clientX - px) * 0.005;
  rotX = Math.max(0.2, Math.min(1.3, rotX + (e.clientY - py) * 0.005));

  px = e.clientX;
  py = e.clientY;

  updateCam();
});

renderer.domElement.addEventListener("wheel", e => {
  zoom = Math.max(10, Math.min(40, zoom + e.deltaY * 0.02));
  updateCam();
});

// --------------------
// RESIZE
// --------------------

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// --------------------
// LOOP
// --------------------

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
